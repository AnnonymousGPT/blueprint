# Exported from Render on 2026-07-11T02:51:33Z
version: "1"
services:
- type: web
  name: blueprint-backend
  runtime: node
  repo: https://github.com/AnnonymousGPT/blueprint
  plan: free
  envVars:
  - key: GOOGLE_CLIENT_SECRET
    sync: false
  - key: GOOGLE_CLIENT_ID
    sync: false
  - key: RAZORPAY_KEY_SECRET
    sync: false
  - key: RAZORPAY_KEY_ID
    sync: false
  - key: SUPABASE_SERVICE_ROLE_KEY
    sync: false
  - key: SUPABASE_ANON_KEY
    sync: false
  - key: SUPABASE_URL
    sync: false
  - key: JWT_REFRESH_SECRET
    sync: false
  - key: JWT_ACCESS_SECRET
    sync: false
  - key: DATABASE_URL
    sync: false
  - key: AWS_REGION
    value: ap-south-1
  - key: S3_BUCKET_NAME
    value: blueprint-advisor-documents
  - key: PORT
    value: 10000
  - key: NODE_ENV
    value: production
  - key: FCM_SERVER_KEY
    sync: false
  region: oregon
  buildCommand: npm ci && npm run prisma:generate && npm run build
  startCommand: npm start
  healthCheckPath: /health
  autoDeployTrigger: commit
  rootDir: backend
