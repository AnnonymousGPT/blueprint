# Render Deployment Configuration — Blueprint Advisor
# Updated: 2026-07-13 — Production Deployment Execution
version: "1"
services:
- type: web
  name: blueprint-backend
  runtime: node
  repo: https://github.com/AnnonymousGPT/blueprint
  plan: free
  envVars:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: 10000
  - key: AWS_REGION
    value: ap-south-1
  - key: S3_BUCKET_NAME
    value: blueprint-advisor-documents
  # Secrets — set manually in Render Dashboard (sync: false = not committed to repo)
  - key: DATABASE_URL
    sync: false
  - key: JWT_ACCESS_SECRET
    sync: false
  - key: JWT_REFRESH_SECRET
    sync: false
  - key: SUPABASE_URL
    sync: false
  - key: SUPABASE_ANON_KEY
    sync: false
  - key: SUPABASE_SERVICE_ROLE_KEY
    sync: false
  - key: RAZORPAY_KEY_ID
    sync: false
  - key: RAZORPAY_KEY_SECRET
    sync: false
  - key: GOOGLE_CLIENT_ID
    sync: false
  - key: GOOGLE_CLIENT_SECRET
    sync: false
  - key: FCM_SERVER_KEY
    sync: false
  # CORS — production frontend origins
  - key: FRONTEND_URL
    value: https://blueprintadvisor.in
  - key: EXPERT_URL
    value: https://blueprintadvisor.in/expert
  - key: ALLOWED_ORIGINS
    value: https://blueprintadvisor.in,https://www.blueprintadvisor.in,capacitor://localhost
  region: oregon
  # Build: generate Prisma client → compile TS → deploy pending migrations
  buildCommand: npm install --include=dev && npm run prisma:generate && npm run build && npx prisma migrate deploy
  startCommand: npm start
  autoDeployTrigger: commit
  rootDir: backend
  healthCheckPath: /health
