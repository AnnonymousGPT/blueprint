events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend API Server Upstream
    upstream backend_server {
        server backend:5000;
    }

    # 1. HTTP Redirect to HTTPS (Port 80)
    server {
        listen 80;
        server_name blueprintadvisor.in www.blueprintadvisor.in localhost;

        # Certbot challenge verification path (Let's Encrypt auto-renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Production HTTPS Server (Port 443)
    server {
        listen 443 ssl;
        server_name blueprintadvisor.in www.blueprintadvisor.in localhost;

        # SSL Certificates (Volume mapped from Certbot container)
        ssl_certificate /etc/letsencrypt/live/blueprintadvisor.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/blueprintadvisor.in/privkey.pem;

        # SSL Parameters & Security Optimizations
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 3. Security Headers (High Priority Issue #4)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: wss: ws:;" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Express API Server proxying
        location /api {
            proxy_pass http://backend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Sockets Io proxying
        location /socket.io {
            proxy_pass http://backend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Client Frontend Root
        location / {
            root /usr/share/nginx/html/client;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Admin Dashboard
        location /admin {
            alias /usr/share/nginx/html/admin;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # Expert Portal
        location /expert {
            alias /usr/share/nginx/html/expert;
            index index.html;
            try_files $uri $uri/ /expert/index.html;
        }
    }
}
