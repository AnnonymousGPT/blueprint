version: '3.8'

services:
  # 1. PostgreSQL Database Instance
  database:
    image: postgres:15-alpine
    container_name: blueprint_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
      POSTGRES_DB: blueprint_advisor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Express TypeScript Backend Application
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: blueprint_backend
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword123@database:5432/blueprint_advisor?schema=public
      - JWT_ACCESS_SECRET=super_secret_access_token_key_123
      - JWT_REFRESH_SECRET=super_secret_refresh_token_key_987
      - RAZORPAY_KEY_ID=rzp_test_mockkey
      - RAZORPAY_KEY_SECRET=mock_secret_key
      - ALLOWED_ORIGINS=https://blueprintadvisor.in,https://www.blueprintadvisor.in,http://localhost:5173,http://localhost:5174,http://localhost:5175
      - REDIS_URL=redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started

  # 3. Nginx Gateway Reverse Proxy (HTTPS Enabled)
  gateway:
    image: nginx:alpine
    container_name: blueprint_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html/client
      - ./admin/dist:/usr/share/nginx/html/admin
      - ./expert/dist:/usr/share/nginx/html/expert
      # SSL Mounts
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/www/certbot
    depends_on:
      - backend

  # 4. Certbot for SSL Certificate Renewals (High Priority Issue #4)
  certbot:
    image: certbot/certbot
    container_name: blueprint_certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - gateway

  # 5. Redis Broker for Queues (BullMQ Support)
  redis:
    image: redis:alpine
    container_name: blueprint_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  certbot_etc:
  certbot_var:
  redis_data:
